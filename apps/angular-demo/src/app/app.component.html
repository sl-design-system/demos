<div class="app-layout">
  <nav class="sidebar">
    <h2>Angular Demo App</h2>
    <ul>
      @for (item of navItems; track item.path) {
        <li>
          <a [routerLink]="item.path" routerLinkActive="active">{{
            item.label
          }}</a>
        </li>
      }
    </ul>
  </nav>
  <main class="content">
    <router-outlet />
  </main>
</div>

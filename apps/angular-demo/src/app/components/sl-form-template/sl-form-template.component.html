<sl-form #form>
  <sl-form-field label="Name">
    <sl-text-field [(ngModel)]="name" name="name" required></sl-text-field>
  </sl-form-field>

  <sl-form-field label="I agree">
    <sl-checkbox [(ngModel)]="agreed" name="agreed" required
      >I agree</sl-checkbox
    >
  </sl-form-field>

  <sl-button-bar>
    <sl-button variant="primary" (click)="onSubmit()">Confirm</sl-button>
  </sl-button-bar>
</sl-form>

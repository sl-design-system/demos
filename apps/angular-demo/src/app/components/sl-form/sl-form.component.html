<sl-form>
  <sl-form-field label="Name">
    <sl-text-field name="name" required (sl-change)="onNameChange($event)"></sl-text-field>
  </sl-form-field>

  <sl-form-field label="I agree">
    <sl-checkbox name="agree" (sl-change)="onAgreeChange($event)"></sl-checkbox>
  </sl-form-field>

  <sl-button-bar>
    <sl-button variant="primary" [disabled]="!name || !agreed" (click)="onSubmit()">Confirm</sl-button>
  </sl-button-bar>
</sl-form>

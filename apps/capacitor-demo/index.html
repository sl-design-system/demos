<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
    />
    <meta name="color-scheme" content="light dark" />
    <title>SLDS Demo</title>
    <link rel="stylesheet" href="./light.css" id="theme-light" />
    <link rel="stylesheet" href="./dark.css" id="theme-dark" disabled />
    <style>
      :root {
        --app-accent: #2c5be8;
        --app-accent-soft: #e0eaff;
        --app-bar-bg: #ffffff;
        --app-bg: #f5f6fa;
        --app-border: #dddddd;
        --app-fg: #1a1a1a;
        --app-fg-muted: #666666;
        --app-glass: rgb(255 255 255 / 62%);
        --app-glass-border: rgb(255 255 255 / 55%);
        --app-glass-shadow: rgb(0 0 0 / 12%);
        --app-surface: #ffffff;
      }

      html.dark {
        --app-accent: #7da2ff;
        --app-accent-soft: #24304d;
        --app-bar-bg: #1a1d23;
        --app-bg: #14161a;
        --app-border: #33373f;
        --app-fg: #e8eaed;
        --app-fg-muted: #9aa0a6;
        --app-glass: rgb(28 30 36 / 60%);
        --app-glass-border: rgb(255 255 255 / 12%);
        --app-glass-shadow: rgb(0 0 0 / 45%);
        --app-surface: #1f2229;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overscroll-behavior: none;
        background: var(--app-bg);
      }

      demo-app {
        display: flex;
        width: 100%;
        height: 100%;
      }

      /* iOS-like push/pop animations for route changes. The app shell sets
         data-nav-direction on <html> while a view transition runs; the
         page content carries view-transition-name: page-view. Pushes slide
         in from the right, pops (back button, swipe-back) slide out to the
         right. The app bar and tab bar stay put. */
      ::view-transition-old(root),
      ::view-transition-new(root) {
        animation: none;
      }

      ::view-transition-old(page-view),
      ::view-transition-new(page-view) {
        animation-duration: 0.28s;
        animation-timing-function: cubic-bezier(0.33, 1, 0.68, 1);
      }

      html[data-nav-direction='forward']::view-transition-new(page-view) {
        animation-name: slide-in-from-right;
      }

      html[data-nav-direction='forward']::view-transition-old(page-view) {
        animation-name: slide-out-to-left;
      }

      html[data-nav-direction='back']::view-transition-new(page-view) {
        animation-name: slide-in-from-left;
      }

      html[data-nav-direction='back']::view-transition-old(page-view) {
        animation-name: slide-out-to-right;
      }

      @keyframes slide-in-from-right {
        from {
          transform: translateX(100%);
        }
      }

      @keyframes slide-out-to-left {
        to {
          opacity: 0.6;
          transform: translateX(-28%);
        }
      }

      @keyframes slide-in-from-left {
        from {
          opacity: 0.6;
          transform: translateX(-28%);
        }
      }

      @keyframes slide-out-to-right {
        to {
          transform: translateX(100%);
        }
      }
    </style>
  </head>
  <body>
    <demo-app></demo-app>
    <script type="module" src="./src/index.ts"></script>
  </body>
</html>
